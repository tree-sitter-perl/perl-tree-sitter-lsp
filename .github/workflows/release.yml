name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write  # needed for crates.io Trusted Publishing

jobs:
  # Gate the release on the gold-corpus regression harness (exact-assertion
  # LSP-capability checks against a version-pinned module substrate).
  gold-corpus:
    name: Gold corpus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: System libraries (XS build deps)
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libxml2-dev zlib1g-dev

      - uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: "5.38"
          install-modules-with: cpm

      - name: Cache corpus substrate
        uses: actions/cache@v4
        with:
          path: gold-corpus/local
          key: gold-corpus-${{ runner.os }}-perl5.38-${{ hashFiles('gold-corpus/cpanfile.snapshot') }}

      - name: Install pinned substrate (cpm + snapshot)
        working-directory: gold-corpus
        run: |
          cpm install -g Carton::Snapshot   # --resolver snapshot needs this to read cpanfile.snapshot
          cpm install -L local --resolver snapshot

      - name: Build release binary
        run: cargo build --release

      - name: Run gold-corpus harness
        run: perl gold-corpus/run.pl

  publish-crate:
    name: Publish to crates.io
    needs: gold-corpus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Validate version matches tag
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG_VERSION=${GITHUB_REF_NAME#v}
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Cargo.toml version ($CARGO_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi

      - uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish to crates.io
        run: cargo publish || echo "Already published (idempotent)"
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # Create the GitHub Release with hand-curated notes (the section for this tag
  # from CHANGELOG.md), prepended to GitHub's auto-generated commit list. Runs
  # before `build` so the release exists with its body before the matrix jobs
  # append platform binaries (those upload steps don't touch the body).
  release-notes:
    name: Release notes
    needs: publish-crate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract CHANGELOG section for this tag
        run: |
          # Pull the block under `## <tag>` (e.g. `## v0.4.0`) up to the next `## `.
          awk -v hdr="## ${GITHUB_REF_NAME}" '
            $0 == hdr {f=1; next}
            /^## / && f {exit}
            f
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release ${GITHUB_REF_NAME}." > RELEASE_NOTES.md
            echo "::warning::No CHANGELOG.md section for ${GITHUB_REF_NAME}; using a stub body."
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          generate_release_notes: true

  build:
    name: Build ${{ matrix.target }}
    needs: release-notes
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../perl-lsp-${{ matrix.target }}.tar.gz perl-lsp
          cd ../../..

      - name: Package (windows)
        if: matrix.archive == 'zip'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../perl-lsp-${{ matrix.target }}.zip perl-lsp.exe
          cd ../../..

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: perl-lsp-${{ matrix.target }}.${{ matrix.archive }}

  # Publish the VS Code extension to both marketplaces. Runs after `build` so
  # the release assets the extension downloads on activation already exist.
  # MS side is secret-free: the `release` environment's OIDC token federates
  # into a managed identity that is a Contributor member of the publisher.
  # Open VSX has no Entra equivalent — token secret, step skips when unset.
  publish-extension:
    name: Publish VS Code extension
    needs: build
    runs-on: ubuntu-latest
    environment: release
    env:
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: editors/vscode/.node-version

      - name: Validate versions match tag
        run: |
          TAG_VERSION=${GITHUB_REF_NAME#v}
          PKG_VERSION=$(node -p "require('./package.json').version")
          TS_VERSION=$(grep -oP 'const VERSION = "\K[^"]+' src/extension.ts)
          for v in "$PKG_VERSION" "$TS_VERSION"; do
            if [ "$v" != "$TAG_VERSION" ]; then
              echo "ERROR: extension version ($PKG_VERSION pkg / $TS_VERSION ts) != tag ($TAG_VERSION)"
              exit 1
            fi
          done

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          allow-no-subscriptions: true

      - name: Build and package
        run: |
          npm ci
          npm run compile
          npx vsce package -o perl-lsp.vsix

      - name: Publish to VS Marketplace
        run: npx vsce publish --packagePath perl-lsp.vsix --azure-credential

      # Same .vsix to both stores — byte-identical artifacts by construction.
      - name: Publish to Open VSX
        if: env.OVSX_PAT != ''
        run: npx --yes ovsx publish perl-lsp.vsix -p "$OVSX_PAT"
