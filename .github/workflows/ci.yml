name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-tests:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test

  e2e-tests:
    name: E2E tests (headless nvim)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: v0.11.0

      - name: Run e2e tests
        run: ./run_e2e.sh

  gold-corpus:
    name: Gold corpus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # XS dists in the pinned substrate need system libraries to build.
      - name: System libraries (XS build deps)
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libxml2-dev zlib1g-dev

      - uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: "5.38"
          install-modules-with: cpm

      # Reproducible, version-pinned module tree. Cache keyed on the snapshot so
      # a cold install (~30s) only runs when the pinned set changes.
      - name: Cache corpus substrate
        uses: actions/cache@v5
        with:
          path: gold-corpus/local
          key: gold-corpus-${{ runner.os }}-perl5.38-${{ hashFiles('gold-corpus/cpanfile.snapshot') }}

      - name: Install pinned substrate (cpm + snapshot)
        working-directory: gold-corpus
        run: |
          cpm install -g Carton::Snapshot   # --resolver snapshot needs this to read cpanfile.snapshot
          cpm install -L local --resolver snapshot

      - name: Build release binary
        run: cargo build --release

      - name: Run gold-corpus harness
        run: perl gold-corpus/run.pl
