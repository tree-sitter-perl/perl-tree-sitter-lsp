name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-tests:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone tree-sitter-perl
        run: git clone https://github.com/tree-sitter-perl/tree-sitter-perl.git ../tree-sitter-perl

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Generate parser
        run: cargo install tree-sitter-cli && cd ../tree-sitter-perl && tree-sitter generate

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test

  e2e-tests:
    name: E2E tests (headless nvim)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone tree-sitter-perl
        run: git clone https://github.com/tree-sitter-perl/tree-sitter-perl.git ../tree-sitter-perl

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Generate parser
        run: cargo install tree-sitter-cli && cd ../tree-sitter-perl && tree-sitter generate

      - name: Build release binary
        run: cargo build --release

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: v0.11.0

      - name: Run e2e tests
        run: ./run_e2e.sh
