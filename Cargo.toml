[package]
name = "perl-lsp"
version = "0.2.4"
edition = "2021"
authors = ["tree-sitter-perl contributors"]
license = "Artistic-2.0"
description = "A Perl LSP server built on tree-sitter-perl and tower-lsp"
repository = "https://github.com/tree-sitter-perl/perl-tree-sitter-lsp"
keywords = ["perl", "lsp", "tree-sitter", "language-server"]
categories = ["development-tools", "text-editors"]

[[bin]]
name = "perl-lsp"
path = "src/main.rs"

[dependencies]
tower-lsp = "0.20"
tokio = { version = "1", features = ["full"] }
tree-sitter = "0.25"
ts-parser-perl = "1.0.1"
ts-parser-pod = "1"
dashmap = "6"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bincode = "1"
zstd = "0.13"
rusqlite = { version = "0.32", features = ["bundled"] }
rayon = "1"
ignore = "0.4"
log = "0.4"
env_logger = "0.11"
